<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — Afeez Temitope Bello</title>
<meta name="theme-color" content="#030712" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #030712;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .orb {
    position: absolute;
    width: 24rem;
    height: 24rem;
    border-radius: 9999px;
    filter: blur(80px);
    opacity: 0.3;
    pointer-events: none;
  }
  .orb-blue { background: #3B82F6; top: 20%; left: -8rem; }
  .orb-purple { background: #A855F7; bottom: 20%; right: -8rem; }
  .container { position: relative; z-index: 1; max-width: 28rem; }
  .badge {
    width: 6rem; height: 6rem;
    border-radius: 1.25rem;
    background: linear-gradient(135deg, #3B82F6, #A855F7);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 700;
    margin: 0 auto 1.5rem;
    box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.4);
  }
  h1 {
    font-size: 1.875rem;
    font-weight: 700;
    background: linear-gradient(90deg, #60A5FA, #A78BFA);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .tagline { color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 1.5rem; }
  .message {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 2rem;
    padding: 1rem 1.25rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    backdrop-filter: blur(10px);
  }
  button {
    background: linear-gradient(90deg, #2563EB, #9333EA);
    color: white;
    border: none;
    padding: 0.875rem 2rem;
    border-radius: 0.75rem;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
  }
</style>
</head>
<body>
  <div class="orb orb-blue"></div>
  <div class="orb orb-purple"></div>
  <div class="container">
    <div class="badge">AB</div>
    <h1>Afeez Temitope Bello</h1>
    <p class="tagline">Co-Founder, Klassrun Technologies Ltd.</p>
    <p class="message">
      You're offline right now — but the portfolio is cached and ready
      when you reconnect. Some images and live project links may need a connection.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
